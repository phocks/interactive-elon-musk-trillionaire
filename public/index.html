<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>interactive-elon-musk-trillionaire</title>
  </head>
  <body>
    <div class="app-sim">
      <div class="container">
        <div class="frame">
          <picture>
            <img
              src="https://www.abc.net.au/res/sites/news-projects/interactive-elon-musk-trillionaire/1.1.2/2a342a78868ab2b77d7f.png"
              alt="Elon Test"
            />
          </picture>
        </div>
      </div>
    </div>
  </body>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .app-sim {
      height: 100dvh;
      position: relative; /* needed so absolute .container is contained */
    }

    .container {
      position: absolute;
      inset: 0;
      padding: 18px;
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100%;
    }

    picture {
      position: absolute;
      inset: 0;
      display: block;
    }

    picture img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: top center;
      padding-bottom: 80px; /* rough buffer for clipped area */
    }

    @media (min-width: 1000px) {
      .container {
        padding-inline: 32px;
      }
      .frame {
        width: 50%;
        transform: translateX(calc(100% + 16px));
      }
      picture img {
        object-position: center left;
        max-width: 700px;
      }
    }
  </style>
</html>
